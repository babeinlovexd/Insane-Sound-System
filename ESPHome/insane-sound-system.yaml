# ##############################################################################
# HARDWARE-PIN-BELEGUNG V5 (Main ESP32-S3):
#
# [AUDIO & MULTIPLEXER - SN74CB3Q3257]
# - GPIO 15          : I2S BCK  (WLAN/HA) -> Mux Eingang 1B2
# - GPIO 16          : I2S LRCK (WLAN/HA) -> Mux Eingang 2B2
# - GPIO 17          : I2S DATA (WLAN/HA) -> Mux Eingang 3B2
# - GPIO 18          : Mux Select         -> LOW = Bluetooth (B1), HIGH = WLAN/HA (B2)
#
# [BLUETOOTH KOMMUNIKATION & FLASHING - WROOM-32E]
# - GPIO 3           : Music Status In    <- Von WROOM GPIO 14 (Triggert den Mux)
# - GPIO 1           : UART TX Out        -> Zu WROOM RX0 (GPIO 3) (via 470 Ohm)
# - GPIO 2           : UART RX In         <- Von WROOM TX0 (GPIO 1) (via 470 Ohm)
# - GPIO 7           : WROOM EN (Reset)   -> Zu WROOM EN-Pin (via 1k Ohm)
# - GPIO 39          : WROOM IO0 (Boot)   -> Zu WROOM IO0-Pin (via 1k Ohm)
#
# [VERSTÄRKER STEUERUNG - TPA3110]
# - GPIO 10          : Amp Power (SD)     -> HIGH = An, LOW = Aus (Standby)
# - GPIO 11          : Gain (Turbo)       -> Insane Mode Switch (Inverted Logik)
# - GPIO 12          : Amp Fault In       <- Störungsmeldung vom TPA3110 (Pull-Up)
#
# [BELEUCHTUNG - WS2811 ZONEN via Level Shifter]
# - GPIO 4           : LED Zone 1 Daten   -> Zum SN74AHCT125 Level Shifter
# - GPIO 5           : LED Zone 2 Daten   -> Zum SN74AHCT125 Level Shifter
# - GPIO 6           : LED Zone 3 Daten   -> Zum SN74AHCT125 Level Shifter
# - GPIO 48          : LED Onboard  
#
# [KLIMA & SENSOREN]
# - GPIO 42          : Lüfter PWM Out     -> Steuert 24V Gehäuselüfter 
# - GPIO 8           : I2C SDA            -> Temp-Sensoren & Expansion
# - GPIO 9           : I2C SCL            -> Temp-Sensoren & Expansion
#
# [SYSTEM, DEBUGGING & SPEICHER]
# - GPIO 43          : UART TX0           -> Debugging (Expansion Header)
# - GPIO 44          : UART RX0           -> Debugging (Expansion Header)
# - GPIO 33 bis 37   : RESERVIERT         -> NICHT NUTZEN! (Für 8MB Octal PSRAM)
#
# ##############################################################################
# HARDWARE-PIN-BELEGUNG V5 (Bluetooth Chip ESP32-WROOM-32E):
#
# [STROMVERSORGUNG & SYSTEM (SMD 1206)]
# - 3V3 Pin          : Power In           <- Von AMS1117-3.3 (mit 10µF & 100nF Kerkos)
# - GND Pins         : Masse              -> An Ground-Plane (Bodenpad zwingend verlöten!)
# - EN Pin           : Reset-Logik        <- Von S3 GPIO 38 (via 1k Ohm) 
#                                            (+ 10k Pull-Up zu 3.3V & 1µF Kerko zu GND)
# - IO0 (GPIO 0)     : Flash-Trigger      <- Von S3 GPIO 39 (via 1k Ohm) 
#                                            (+ 10k Pull-Up zu 3.3V)
#
# [KOMMUNIKATION & ON-BOARD FLASHING (UART0)]
# - GPIO 3 (RX0)     : Daten/Flash Empfang<- Von S3 GPIO 1 (TX) (via 470 Ohm)
# - GPIO 1 (TX0)     : Daten/Meta Senden  -> Zu S3 GPIO 2 (RX) (via 470 Ohm)
#
# [AUDIO & MULTIPLEXER]
# - GPIO 27          : I2S BCK            -> Mux Eingang 1B1
# - GPIO 25          : I2S LRCK (WS)      -> Mux Eingang 2B1
# - GPIO 26          : I2S DATA (DOUT)    -> Mux Eingang 3B1
# - GPIO 14          : Music Status Out   -> Zu S3 GPIO 3 (HIGH = Play, LOW = Pause/Offline)
#
# ##############################################################################

esphome:
  name: insane-sound-system
  friendly_name: "Insane Sound System"
  project:
    name: "babeinlovexd.insane_sound_system"
    version: "5.0"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino # Arduino-Framework beibehalten, da NeoPixelBus das braucht!

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Insane-Sound Fallback"
    password: !secret ap_password

web_server:
  port: 80

captive_portal:

# ##############################################################################
# BUS-SYSTEME (I2C, I2S & UART)
# ##############################################################################

i2c:
  sda: GPIO8  # S3 Pin 12 (Label: GPIO8)
  scl: GPIO9  # S3 Pin 15 (Label: GPIO9)
  scan: true
  frequency: 100kHz

i2s_audio:
  - id: i2s_bus
    i2s_bclk_pin: GPIO15  # S3 Pin 8 (Label: GPIO15 / MTDO)
    i2s_lrclk_pin: GPIO16 # S3 Pin 9 (Label: GPIO16 / MTDI)

uart:
  id: uart_bl
  tx_pin: GPIO1  # S3 Pin 41 (Label: GPIO1) -> Geht an ESP BL RX
  rx_pin: GPIO2  # S3 Pin 40 (Label: GPIO2) -> Geht an ESP BL TX
  baud_rate: 115200

# ##############################################################################
# AUDIO & MEDIA PLAYER (WLAN / Home Assistant)
# ##############################################################################

media_player:
  - platform: i2s_audio
    name: "Insane Sound System"
    id: decken_audio
    dac_type: external
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO17  # S3 Pin 10 (Label: GPIO17 / MTCK)
    mode: stereo
    on_play:
      - switch.turn_on: amp_power
    on_pause:
      - switch.turn_off: amp_power
    on_idle:
      - switch.turn_off: amp_power

# ##############################################################################
# BELEUCHTUNG (WS2811)
# ##############################################################################

light:
  - platform: neopixelbus
    name: "Licht Zone 1"
    id: light_1
    pin: GPIO4  # S3 Pin 4 (Label: GPIO4)
    num_leds: 30
    type: BRG  
    variant: WS2811
    effects: &effekte 
      - addressable_rainbow:
          name: "Regenbogen"
      - addressable_color_wipe:
          name: "Wisch-Effekt"
      - addressable_scan:
          name: "Knight Rider"
      - addressable_twinkle:
          name: "Funkeln"
      - addressable_fireworks:
          name: "Feuerwerk"

  - platform: neopixelbus
    name: "Licht Zone 2"
    pin: GPIO5  # S3 Pin 5 (Label: GPIO5)
    num_leds: 30
    type: BRG
    variant: WS2811
    effects: *effekte

  - platform: neopixelbus
    name: "Licht Zone 3"
    pin: GPIO6  # S3 Pin 6 (Label: GPIO6)
    num_leds: 30
    type: BRG
    variant: WS2811
    effects: *effekte
    
  - platform: neopixelbus
    name: "Mainboard Status LED"
    id: onboard_led
    pin: GPIO48 
    num_leds: 1
    type: GRB
    variant: WS2812

# ##############################################################################
# HARDWARE STEUERUNG (Switches, Buttons & Lüfter)
# ##############################################################################

switch:
  - platform: gpio
    pin: GPIO10  # S3  (Label: GPIO10)
    name: "Verstärker Power"
    id: amp_power
    restore_mode: ALWAYS_OFF 

  - platform: gpio
    pin: GPIO11  # S3 Pin 18 (Label: GPIO12)
    name: "Insane Turbo Mode"
    id: insane_mode
    restore_mode: ALWAYS_OFF
    inverted: true

  - platform: gpio
    pin: GPIO18  # S3 Pin 11 (Label: GPIO18)
    id: mux_select
    name: "Audio Quelle (Intern)"
    internal: true # Versteckt in HA, agiert vollautomatisch im Hintergrund
    restore_mode: ALWAYS_ON # ON (HIGH) = B2 Eingang = S3/WLAN aktiv
    
  - platform: gpio
    pin: GPIO07
    id: bl_en_pin
    name: "WROOM EN (Reset)"
    restore_mode: ALWAYS_ON # Muss HIGH sein, damit der WROOM normal läuft

  - platform: gpio
    pin: GPIO39
    id: bl_io0_pin
    name: "WROOM IO0 (Boot)"
    restore_mode: ALWAYS_ON # Muss HIGH sein, außer beim Flashen

button:
  - platform: restart
    name: "ESP32 Neustart"
    id: system_neustart

  - platform: template
    name: "BL Play/Pause"
    icon: "mdi:play-pause"
    on_press:
      - lambda: |-
          if (id(bl_status).state == "PLAY") id(uart_bl).write_str("PAUSE\n");
          else id(uart_bl).write_str("PLAY\n");
  - platform: template
    name: "BL Nächster Titel"
    icon: "mdi:skip-next"
    on_press:
      - uart.write: "NEXT\n"
  - platform: template
    name: "BL Vorheriger Titel"
    icon: "mdi:skip-previous"
    on_press:
      - uart.write: "PREV\n"
      
  - platform: template
    name: "Update Bluetooth Modul"
    id: flash_wroom_btn
    icon: "mdi:bluetooth-transfer"
    on_press:
      - logger.log: "Starte Flash-Vorgang für den WROOM..."
      # 1. WROOM in den Download-Modus zwingen
      - switch.turn_off: bl_en_pin      # EN auf GND (Reset)
      - switch.turn_off: bl_io0_pin     # IO0 auf GND (Download Mode)
      - delay: 100ms
      - switch.turn_on: bl_en_pin       # EN wieder HIGH (Chip startet)
      - delay: 50ms
      - switch.turn_on: bl_io0_pin      # IO0 wieder HIGH (Modus eingerastet)
      
      - logger.log: "WROOM ist im Flash-Modus. Übertrage Firmware aus dem PSRAM..."
      
      # 2. Aufruf der C++ Logik, die die .bin schickt
      - lambda: |-
          custom_flasher::write_firmware(id(uart_bl));
          ESP_LOGI("BL_FLASH", "Simulation: Firmware wird geschrieben...");
          
      # 3. WROOM nach dem Flashen neu starten
      - logger.log: "Flash-Vorgang beendet. Starte WROOM neu..."
      - switch.turn_off: bl_en_pin
      - delay: 100ms
      - switch.turn_on: bl_en_pin
      - logger.log: "WROOM läuft nun mit der neuen Software!"

number:
  - platform: template
    name: "Bluetooth Lautstärke"
    id: bl_volume_slider
    icon: "mdi:volume-high"
    min_value: 0
    max_value: 127
    step: 5
    initial_value: 100
    optimistic: true
    set_action:
      then:
        - lambda: |-
            char buf[20];
            sprintf(buf, "SET_VOL:%.0f\n", x);
            id(uart_bl).write_str(buf);

output:
  - platform: ledc
    pin: GPIO42  # S3 Pin 39 (Label: MTMS / GPIO42)
    id: fan_pwm
    frequency: 25000 Hz 

fan:
  - platform: speed
    output: fan_pwm
    name: "Gehäuse Lüfter"
    id: the_fan

# ##############################################################################
# SENSOREN & BLUETOOTH-LOGIK
# ##############################################################################

binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO12  # S3 (Label: GPIO12)
      mode: INPUT_PULLUP 
    name: "Verstärker Störung"
    id: amp_fault
    device_class: problem
    filters:
      - invert: {}      
      - delayed_on: 50ms 
    on_press:
      then:
        - switch.turn_off: amp_power
        - logger.log: "ALARM: TPA3110 meldet Fehler (Hitze/Kurzschluss)! Notabschaltung."

  # ---Hardware-Umschaltung des I2S-Buses ---
  - platform: gpio
    pin: 
      number: GPIO3  # S3 Pin 13 (Label: GPIO3) -> Signal vom ESP BL
      mode: INPUT_PULLDOWN
    name: "Bluetooth Stream Aktiv"
    id: music_active_bl
    on_press:
      - logger.log: "Bluetooth aktiv! Schalte Hardware-Multiplexer auf Bluetooth (B1)."
      - media_player.stop: decken_audio
      - delay: 100ms
      - switch.turn_off: mux_select # LOW = Mux schaltet auf B1 (Bluetooth)
      - switch.turn_on: amp_power 
    on_release:
      - logger.log: "Bluetooth beendet. Schalte Hardware-Multiplexer auf WLAN (B2)."
      - switch.turn_on: mux_select # HIGH = Mux schaltet auf B2 (S3/HA)
      - switch.turn_off: amp_power

sensor:
  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 60s
  
  - platform: internal_temperature
    name: "ESP32 Intern Temp"
  
  - platform: uptime
    name: "System Laufzeit"

  - platform: tmp102
    address: 0x48
    name: "Temp Verstärker"
    id: temp_tpa
    update_interval: 10s
    filters:
      - sliding_window_moving_average: 
          window_size: 5
          send_every: 1

  - platform: tmp102
    address: 0x49
    name: "Temp Spannungsregler"
    id: temp_mp
    update_interval: 10s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: tmp102
    address: 0x4A
    name: "Temp ESP32 Umgebung"
    id: temp_esp
    update_interval: 10s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

# Metadaten vom Bluetooth (Songtexte im Dashboard)
text_sensor:
  - platform: template
    name: "BL Titel"
    id: bl_title
    icon: "mdi:music"
  - platform: template
    name: "BL Interpret"
    id: bl_artist
    icon: "mdi:account-music"
  - platform: template
    name: "BL Album"
    id: bl_album
    icon: "mdi:album"
  - platform: template
    name: "BL Status"
    id: bl_status
    icon: "mdi:bluetooth"

# ##############################################################################
# AUTOMATISIERUNG & INTERVALLE
# ##############################################################################

interval:
  # 1.Lüfter-Logik (Temperatur-basiert)
  - interval: 10s
    then:
      - lambda: |-
          float t1 = id(temp_tpa).state;
          float t2 = id(temp_mp).state;
          float t3 = id(temp_esp).state;
          
          if (isnan(t1)) t1 = 0;
          if (isnan(t2)) t2 = 0;
          if (isnan(t3)) t3 = 0;

          float max_temp = max(t1, max(t2, t3));
          static bool fan_active = false; 

          if (max_temp > 50.0) {
            fan_active = true;
          } 
          else if (max_temp < 48.0) {
            fan_active = false;
          }

          if (fan_active) {
            float speed_pct = (max_temp - 50.0) / 25.0; 
            if (speed_pct > 1.0) speed_pct = 1.0;
            if (speed_pct < 0.3) speed_pct = 0.3; 

            auto call = id(the_fan).make_call();
            call.set_state(true);
            int steps = id(the_fan).get_traits().supported_speed_count();
            call.set_speed((int)(speed_pct * steps));
            call.perform();
            ESP_LOGD("custom_fan", "Max Temp: %.1f°C -> Lüfter: %.0f%%", max_temp, speed_pct * 100);
          } else {
            if (id(the_fan).state) {
              id(the_fan).turn_off();
              ESP_LOGD("custom_fan", "Max Temp: %.1f°C -> Lüfter AUS (Cool-Down)", max_temp);
            }
          }

  # 2. UART Daten lesen und zuordnen 
  - interval: 100ms
    id: uart_reader
    then:
      - lambda: |-
          static std::string buffer = "";
          while (id(uart_bl).available()) {
            uint8_t byte;
            id(uart_bl).read_byte(&byte);
            char c = (char)byte;
            
            if (c == '\n') {
              std::string line = buffer;
              buffer = "";
              
              // Metadaten Parser
              if (line.rfind("TITLE:", 0) == 0) {
                id(bl_title).publish_state(line.substr(6));
              } else if (line.rfind("ARTIST:", 0) == 0) {
                id(bl_artist).publish_state(line.substr(7));
              } else if (line.rfind("ALBUM:", 0) == 0) {
                id(bl_album).publish_state(line.substr(6));
              } else if (line.find("STATUS:PLAY") == 0) {
                id(bl_status).publish_state("Wiedergabe");
              } else if (line.find("STATUS:PAUSE") == 0) {
                id(bl_status).publish_state("Pause");
              } else if (line.find("STATUS:OFFLINE") == 0) {
                id(bl_status).publish_state("Getrennt");
                id(bl_title).publish_state("Bereit");
                id(bl_artist).publish_state("-");
              } 
              // Lautstärke-Rückmeldung vom ESP BL synchronisieren
              else if (line.rfind("VOL:", 0) == 0) {
                float vol = atof(line.substr(4).c_str());
                auto call = id(bl_volume_slider).make_call();
                call.set_value(vol);
                call.perform();
              }
            } else if (c != '\r') {
              buffer += c;
            }
          }