name: Update version.txt on Release

on:
  release:
    types: [published]

jobs:
  update-version-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🏷️ Release-Tag auslesen (ohne 'v')
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

      - name: 📝 version.txt überschreiben
        run: |
          echo "${{ env.NEW_VERSION }}" > Firmware/version.txt

      - name: 🚀 Änderungen committen und pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Firmware/version.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update version.txt to ${{ env.NEW_VERSION }} [skip ci]"
          git push
