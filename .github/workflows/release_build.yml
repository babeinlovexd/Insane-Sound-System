name: Build Firmware & Update Version on Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Repository auschecken (Haupt-Branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0 

      - name: 🛠️ Arduino Sketch kompilieren
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
          libraries: |
            - name: ESP32-A2DP
              source-url: https://github.com/pschatzmann/ESP32-A2DP/archive/refs/heads/main.zip
          sketch-paths: |
            - Arduino/insane_bl_v5.ino
          cli-compile-flags: |
            - --export-binaries

      - name: 🏷️ Release-Tag oder Version auslesen
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep 'String firmware_version' Arduino/insane_bl_v5.ino | cut -d'"' -f2)
          fi
          VERSION=${VERSION#v} # 'v' entfernen, falls das Release z.B. v5.5.0 heißt
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

      - name: 📂 Firmware und Version aktualisieren
        run: |
          mkdir -p Firmware

          find Arduino/build -name "*.merged.bin" -exec cp {} Firmware/insane_bl_v5.ino.merged.bin \;

          echo "${{ env.NEW_VERSION }}" > Firmware/version.txt

      - name: 🚀 Änderungen committen und pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add Firmware/insane_bl_v5.ino.merged.bin
          git add Firmware/version.txt

          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update Firmware (.bin) und version.txt auf ${{ env.NEW_VERSION }} [skip ci]"
          
          git push origin HEAD:${{ github.event.repository.default_branch }}
